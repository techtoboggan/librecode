name: CI

on:
  pull_request:
    branches: [main]
  workflow_call: # called by release.yml as the quality gate
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test-core:
    name: Test (core CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      # Package test script runs unit pass first (excluding mcp-integration)
      # then the integration pass — sibling mcp/ tests install sticky
      # bun mock.module shims that would break the real-transport
      # integration tests if they shared the same `bun test` invocation.
      - run: bun run test
        working-directory: packages/librecode

  test-util:
    name: Test (util)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun test
        working-directory: packages/util

  test-plugin:
    name: Test (plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun test
        working-directory: packages/plugin

  test-app:
    name: Test (app unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
        working-directory: packages/app

  lint:
    name: Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Prettier
        run: bunx prettier --check .
      - name: Biome (warnings only, errors fail)
        run: bunx biome lint .

  # A06 (Vulnerable and Outdated Components) — scan the Rust/Tauri dep graph
  # for known advisories. `bun audit` already runs in CI via bun's test suite
  # for the JS/TS side; cargo-audit is its Rust counterpart.
  rust-audit:
    name: Rust audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Tauri Rust deps
        # audit.toml in the manifest dir declares accepted-risk advisories
        # (unmaintained GTK3 bindings etc). Fails on any UN-ignored advisory.
        run: cargo audit
        working-directory: packages/desktop/src-tauri
