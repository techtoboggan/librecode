name: COPR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g. 0.3.6)"
        required: true
      package:
        description: "Package to submit: cli, desktop, or both"
        required: false
        default: "both"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  copr-cli:
    name: Submit CLI to COPR
    if: github.event_name == 'release' || inputs.package == 'cli' || inputs.package == 'both'
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: dnf install -y --setopt=install_weak_deps=False copr-cli rpm-build curl

      - name: Configure COPR credentials
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = techtoboggan\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "${{ secrets.COPR_API_LOGIN }}" "${{ secrets.COPR_API_TOKEN }}" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Build SRPM and submit
        run: |
          # Version comes from the release tag or manual input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Submitting librecode $VERSION to COPR"

          mkdir -p ~/rpmbuild/{SPECS,SOURCES,SRPMS,BUILD,BUILDROOT}

          # Bundle both arch tarballs into the SRPM so the build works with
          # internet access disabled (no outbound network in COPR mock).
          BASE="https://github.com/techtoboggan/librecode/releases/download/v${VERSION}"
          curl -fL -o ~/rpmbuild/SOURCES/librecode-linux-x64.tar.gz \
            "${BASE}/librecode-linux-x64.tar.gz"
          curl -fL -o ~/rpmbuild/SOURCES/librecode-linux-arm64.tar.gz \
            "${BASE}/librecode-linux-arm64.tar.gz"

          # Inject the real version into the spec file
          sed "s/^Version:.*/Version:        ${VERSION}/" \
            packages/rpm/librecode.spec > ~/rpmbuild/SPECS/librecode.spec

          # Build SRPM — sources are now local so no --nodeps needed
          rpmbuild -bs ~/rpmbuild/SPECS/librecode.spec

          SRPM=$(ls ~/rpmbuild/SRPMS/librecode-${VERSION}-*.src.rpm)
          echo "Submitting: $SRPM"

          # --nowait: return immediately; COPR queues the build asynchronously
          copr-cli build techtoboggan/librecode "$SRPM" --nowait

  # Desktop COPR submission is handled in desktop.yml directly after the
  # linux build, where the RPM is already on disk (avoids the draft-release
  # API problem). This job is intentionally absent from copr.yml.
