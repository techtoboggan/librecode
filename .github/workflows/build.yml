name: Build CLI

# Pre-merge smoke test for CLI matrix builds. Runs on PRs only.
# Release builds are handled by release.yml's build-cli job on tag push.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-x64-baseline
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          # Linux musl
          - target: linux-x64-musl
            os: ubuntu-latest
          # macOS (arm64 only — macos-13/x64 runners have poor availability)
          - target: darwin-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run script/build.ts --target ${{ matrix.target }}
        working-directory: packages/librecode
      - uses: actions/upload-artifact@v4
        with:
          name: librecode-${{ matrix.target }}
          path: packages/librecode/dist/
          retention-days: 7
