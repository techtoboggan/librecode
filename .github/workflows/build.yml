name: Build CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-x64-baseline
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          # Linux musl
          - target: linux-x64-musl
            os: ubuntu-latest
          # macOS
          - target: darwin-x64
            os: macos-13
          - target: darwin-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run script/build.ts --target ${{ matrix.target }}
        working-directory: packages/opencode
      - uses: actions/upload-artifact@v4
        with:
          name: librecode-${{ matrix.target }}
          path: packages/opencode/dist/
          retention-days: 7
