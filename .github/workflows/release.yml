name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-x64-baseline
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          # Linux musl
          - target: linux-x64-musl
            os: ubuntu-latest
          - target: linux-x64-baseline-musl
            os: ubuntu-latest
          - target: linux-arm64-musl
            os: ubuntu-latest
          # macOS
          - target: darwin-x64
            os: macos-13
          - target: darwin-arm64
            os: macos-14
          # Windows
          - target: windows-x64
            os: windows-latest
          - target: windows-arm64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run script/build.ts --target ${{ matrix.target }}
        working-directory: packages/opencode
      - name: Package
        shell: bash
        run: |
          cd packages/opencode/dist
          for dir in librecode-*/; do
            if [[ "$dir" == *"linux"* ]]; then
              tar -czf "${dir%/}.tar.gz" -C "$dir/bin" .
            else
              cd "$dir/bin" && zip -r "../../${dir%/}.zip" . && cd ../..
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: librecode-${{ matrix.target }}
          path: |
            packages/opencode/dist/*.tar.gz
            packages/opencode/dist/*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
