name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-x64-baseline
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          # Linux musl
          - target: linux-x64-musl
            os: ubuntu-latest
          - target: linux-x64-baseline-musl
            os: ubuntu-latest
          - target: linux-arm64-musl
            os: ubuntu-latest
          # macOS (arm64 only — macos-13/x64 runners have poor availability)
          - target: darwin-arm64
            os: macos-14
          # Windows (arm64 omitted — Bun 1.3.10 has no Windows ARM64 binary)
          - target: windows-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # @librecode/i18n is published by the npm-publish workflow which fires in
      # parallel. Poll until the required version is available so bun install
      # doesn't fail with "no matching version found".
      - name: Wait for @librecode/i18n on npm
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for @librecode/i18n@$VERSION..."
          for i in $(seq 1 20); do
            npm view @librecode/i18n@$VERSION version 2>/dev/null && break
            echo "Not yet (attempt $i/20), retrying in 30s..."
            sleep 30
          done

      - run: bun install --frozen-lockfile
      - name: Build
        env:
          LIBRECODE_VERSION: ${{ github.ref_name }}
        run: bun run script/build.ts --target ${{ matrix.target }}
        working-directory: packages/librecode
      - name: Package
        shell: bash
        run: |
          cd packages/librecode/dist
          for dir in librecode-*/; do
            if [[ "$dir" == *"linux"* ]]; then
              tar -czf "${dir%/}.tar.gz" -C "$dir/bin" .
            else
              cd "$dir/bin" && 7z a "../../${dir%/}.zip" . && cd ../..
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: librecode-${{ matrix.target }}
          path: |
            packages/librecode/dist/*.tar.gz
            packages/librecode/dist/*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
      - name: Generate config JSON schema
        run: |
          echo "Config schema is generated in the repo (schema/config.json) — uploading as release asset."
      - uses: actions/checkout@v4
        with:
          path: src
      - name: Attach schema to artifacts
        run: |
          cp src/schema/config.json artifacts/librecode-config-schema.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
            artifacts/librecode-config-schema.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-preview.') || contains(github.ref, '-rc.') }}

      # Submit CLI to COPR from the release job because the release:published
      # event doesn't fire for releases created by GITHUB_TOKEN (GH limitation),
      # so copr.yml never auto-fires. Inlining here guarantees it runs on every
      # tag that has CLI tarballs uploaded.
      - name: Submit CLI to COPR
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-preview.') && !contains(github.ref, '-rc.')
        env:
          COPR_API_LOGIN: ${{ secrets.COPR_API_LOGIN }}
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Submitting librecode $VERSION to COPR"

          sudo apt-get install -y --no-install-recommends rpm rpm2cpio cpio
          pip3 install --break-system-packages copr-cli

          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = techtoboggan\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "$COPR_API_LOGIN" "$COPR_API_TOKEN" > ~/.config/copr
          chmod 600 ~/.config/copr

          mkdir -p ~/rpmbuild/{SPECS,SOURCES,SRPMS,BUILD,BUILDROOT}

          # The CLI tarballs were just built and uploaded — grab them from the artifacts dir
          cp src/packages/rpm/librecode.spec /tmp/librecode.spec.orig
          cp artifacts/librecode-linux-x64.tar.gz ~/rpmbuild/SOURCES/
          cp artifacts/librecode-linux-arm64.tar.gz ~/rpmbuild/SOURCES/

          sed "s/^Version:.*/Version:        ${VERSION}/" \
            src/packages/rpm/librecode.spec > ~/rpmbuild/SPECS/librecode.spec

          rpmbuild -bs ~/rpmbuild/SPECS/librecode.spec
          SRPM=$(ls ~/rpmbuild/SRPMS/librecode-${VERSION}-*.src.rpm)
          echo "Submitting: $SRPM"
          copr-cli build techtoboggan/librecode "$SRPM" --nowait
