name: Release

# MASTER ORCHESTRATOR. Fires on tag push and calls every sub-workflow in
# the correct order. No sub-workflow fires on tag push directly — they all
# receive their version via workflow_call inputs.
#
# Pipeline:
#   1. quality      (ci.yml) — typecheck + tests + lint must pass
#   2. publish-npm  (npm-publish.yml) — SDK + plugin to npm via OIDC
#   3. build-cli    (inline) — CLI tarballs for 8 platforms
#   4. build-desktop (desktop.yml) — Tauri installers for Linux/macOS/Windows
#   5. build-flatpak (flatpak.yml) — Flatpak bundle
#   6. github-release (inline) — uploads ALL artifacts to the GitHub Release
#   7. copr         (copr.yml) — submits CLI + desktop SRPMs to COPR

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # required for npm OIDC in sub-workflows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Stage 0: Compute version from tag (strips the v prefix) ──────────────
  prep:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Version for this release: ${V}"

  # ─── Stage 1: Quality gate ────────────────────────────────────────────────
  quality:
    name: Quality gate (tests + lint)
    needs: prep
    uses: ./.github/workflows/ci.yml

  # ─── Stage 2: Publish npm packages ────────────────────────────────────────
  publish-npm:
    name: Publish npm
    needs: [prep, quality]
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.prep.outputs.version }}
    secrets: inherit

  # ─── Stage 3: Build CLI tarballs ──────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: [prep, publish-npm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64, os: ubuntu-latest }
          - { target: linux-x64-baseline, os: ubuntu-latest }
          - { target: linux-arm64, os: ubuntu-latest }
          - { target: linux-x64-musl, os: ubuntu-latest }
          - { target: linux-x64-baseline-musl, os: ubuntu-latest }
          - { target: linux-arm64-musl, os: ubuntu-latest }
          - { target: darwin-arm64, os: macos-14 }
          - { target: windows-x64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Build
        env:
          LIBRECODE_VERSION: ${{ github.ref_name }}
        run: bun run script/build.ts --target ${{ matrix.target }}
        working-directory: packages/librecode
      - name: Package
        shell: bash
        run: |
          cd packages/librecode/dist
          for dir in librecode-*/; do
            if [[ "$dir" == *"linux"* ]]; then
              tar -czf "${dir%/}.tar.gz" -C "$dir/bin" .
            else
              cd "$dir/bin" && 7z a "../../${dir%/}.zip" . && cd ../..
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            packages/librecode/dist/*.tar.gz
            packages/librecode/dist/*.zip

  # ─── Stage 4: Build desktop apps ──────────────────────────────────────────
  build-desktop:
    name: Build desktop
    needs: [prep, publish-npm]
    uses: ./.github/workflows/desktop.yml
    with:
      version: ${{ needs.prep.outputs.version }}
    secrets: inherit

  # ─── Stage 5: Build Flatpak ───────────────────────────────────────────────
  # ─── TEMPORARILY DISABLED during Linux-focused beta (v0.9.2x) ─────────
  # Flatpak builds on a GNOME 47 runtime container and takes ~20 min of
  # cargo compile. Re-enable together with the macOS/Windows matrix entries
  # above by uncommenting this block AND adding 'build-flatpak' back to
  # github-release's needs: list.
  # build-flatpak:
  #   name: Build Flatpak
  #   needs: [prep, publish-npm]
  #   uses: ./.github/workflows/flatpak.yml
  #   with:
  #     version: ${{ needs.prep.outputs.version }}
  #   secrets: inherit

  # ─── Stage 6: Create GitHub Release with ALL artifacts ────────────────────
  github-release:
    name: Create GitHub Release
    # When build-flatpak is re-enabled, add it back to this list.
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      # ─── Flatpak artifact download — TEMPORARILY DISABLED ──────────────
      # Paired with the disabled build-flatpak job above. Re-enable when
      # flipping the rest of the non-Linux beta gates back on.
      # - uses: actions/download-artifact@v4
      #   with:
      #     name: flatpak
      #     path: artifacts

      - name: Generate checksums + attach schema
        run: |
          cd artifacts
          # A08: SHA256SUMS covers every release artifact, not just CLI tarballs.
          # Desktop installers (.deb/.rpm/.exe/.dmg/.flatpak/.AppImage) previously
          # shipped without integrity hashes — users had no way to verify them.
          # During the Linux-only beta phase, fewer globs actually match (no
          # .exe/.dmg/.flatpak). Threshold lowered to 3 accordingly — raise
          # back to 5 when full-platform builds are re-enabled.
          sha256sum *.tar.gz *.zip *.deb *.rpm *.exe *.dmg *.flatpak *.AppImage 2>/dev/null > SHA256SUMS || true
          if [ ! -s SHA256SUMS ] || [ "$(wc -l < SHA256SUMS)" -lt 3 ]; then
            echo "::error::SHA256SUMS has fewer than 3 entries — something is wrong"
            cat SHA256SUMS
            exit 1
          fi
          cp ../src/schema/config.json librecode-config-schema.json

      # A08 (SBOM) — emit CycloneDX manifests of the npm and Rust dep graphs.
      # Consumers + scanners can use these to enumerate what actually shipped.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      # Node needed separately because @cyclonedx/cyclonedx-npm inspects the
      # invoking package manager's version and rejects anything <9. Bunx
      # exposes bun's version number (1.x) which fails the npm check.
      - uses: actions/setup-node@v4
        with:
          node-version: "24.9.0"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOMs
        working-directory: src
        run: |
          bun install --frozen-lockfile
          bash scripts/generate-sboms.sh --ci
          cp sbom-npm.json sbom-rust.json ../artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.flatpak
            artifacts/SHA256SUMS
            artifacts/librecode-config-schema.json
            artifacts/sbom-npm.json
            artifacts/sbom-rust.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-preview.') || contains(github.ref, '-rc.') }}

  # ─── Stage 7: Submit to COPR ──────────────────────────────────────────────
  # Runs after github-release so the CLI tarballs are downloadable by COPR spec
  copr-submit:
    name: Submit to COPR
    needs: [prep, github-release]
    if: ${{ !contains(github.ref, '-preview.') && !contains(github.ref, '-rc.') }}
    uses: ./.github/workflows/copr.yml
    with:
      version: ${{ needs.prep.outputs.version }}
      package: "both"
    secrets: inherit
