name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            build-args: "--target linux-x64"
          - target: linux-x64-baseline
            os: ubuntu-latest
            build-args: "--target linux-x64-baseline"
          - target: linux-x64-musl
            os: ubuntu-latest
            build-args: "--target linux-x64-musl"
          - target: linux-x64-baseline-musl
            os: ubuntu-latest
            build-args: "--target linux-x64-baseline-musl"
          - target: linux-arm64
            os: ubuntu-latest
            build-args: "--target linux-arm64"
          - target: linux-arm64-musl
            os: ubuntu-latest
            build-args: "--target linux-arm64-musl"
          - target: darwin-x64
            os: macos-13
            build-args: "--target darwin-x64"
          - target: darwin-arm64
            os: macos-14
            build-args: "--target darwin-arm64"
          - target: windows-x64
            os: windows-latest
            build-args: "--target windows-x64"
          - target: windows-arm64
            os: windows-latest
            build-args: "--target windows-arm64"

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run script/build.ts --single ${{ matrix.build-args }}
        working-directory: packages/opencode
      - name: Package
        shell: bash
        run: |
          cd packages/opencode/dist
          for dir in librecode-*/; do
            tar -czf "${dir%/}.tar.gz" "$dir"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: librecode-${{ matrix.target }}
          path: packages/opencode/dist/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
