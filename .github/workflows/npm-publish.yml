name: Publish npm packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-sdk:
    name: Publish @librecode/sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: packages/sdk/js
        run: bun run build

      - name: Prepare package.json for publish
        working-directory: packages/sdk/js
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          for (const [key, value] of Object.entries(pkg.exports)) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '0.1.0';
          pkg.version = version;
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/sdk@' + version);
          "

      - name: Publish
        working-directory: packages/sdk/js
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-plugin:
    name: Publish @librecode/plugin
    needs: publish-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Build plugin
        working-directory: packages/plugin
        run: bunx tsc

      - name: Prepare package.json for publish
        working-directory: packages/plugin
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          // Catalog is defined in bun.lock (JSONC with trailing commas), not package.json
          const lockText = require('fs').readFileSync('../../bun.lock', 'utf8');
          const lockJson = lockText.replace(/,(?=\s*[}\]])/g, '');
          const lock = JSON.parse(lockJson);
          const catalog = lock.catalog || {};

          for (const [key, value] of Object.entries(pkg.exports)) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '0.1.0';
          pkg.version = version;

          // Resolve workspace: and catalog: deps to real semver versions
          for (const [k, v] of Object.entries(pkg.dependencies || {})) {
            if (v === 'workspace:*' || v === 'workspace:^' || v.startsWith('workspace:')) {
              pkg.dependencies[k] = '^' + version;
            } else if (v === 'catalog:' || v.startsWith('catalog:')) {
              const resolved = catalog[k];
              if (resolved) pkg.dependencies[k] = '^' + resolved;
            }
          }
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/plugin@' + version);
          console.log('Dependencies:', JSON.stringify(pkg.dependencies, null, 2));
          "

      - name: Publish
        working-directory: packages/plugin
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
