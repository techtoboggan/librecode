name: Publish npm packages

# Called by release.yml. Also manually triggerable.
# Publishes @librecode/sdk and @librecode/plugin via OIDC trusted publishing.
# @librecode/i18n is published separately by the librecode-i18n repo's own workflow.
on:
  workflow_call:
    inputs:
      version:
        description: "Version to publish (without leading v), e.g. 0.9.5"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v), e.g. 0.9.5"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ inputs.version }}

jobs:
  publish-sdk:
    name: Publish @librecode/sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          # Pinned Node 24 LTS. Ships with npm 11.x, required for OIDC trusted
          # publishing (npm ≥ 11.5.1). Node 22 ships npm 10 which predates OIDC.
          node-version: "24.9.0"

      # Wait for i18n to be published (librecode-i18n's own workflow handles that)
      - name: Wait for @librecode/i18n@${{ env.VERSION }} on npm
        run: |
          echo "Waiting for @librecode/i18n@$VERSION..."
          for i in $(seq 1 20); do
            if npm view "@librecode/i18n@$VERSION" version 2>/dev/null; then
              echo "Found"; exit 0
            fi
            echo "Attempt $i/20: not yet, retrying in 30s..."
            sleep 30
          done
          echo "::error::@librecode/i18n@$VERSION never appeared on npm"
          exit 1

      - run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: packages/sdk/js
        run: bun run build

      - name: Prepare package.json
        working-directory: packages/sdk/js
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          for (const [key, value] of Object.entries(pkg.exports)) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          pkg.version = process.env.VERSION;
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/sdk@' + pkg.version);
          "

      - name: Publish (OIDC — no token)
        working-directory: packages/sdk/js
        run: |
          if npm view "@librecode/sdk@$VERSION" version 2>/dev/null; then
            echo "@librecode/sdk@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi

  publish-plugin:
    name: Publish @librecode/plugin
    needs: publish-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          # Pinned Node 24 LTS. Ships with npm 11.x, required for OIDC trusted
          # publishing (npm ≥ 11.5.1). Node 22 ships npm 10 which predates OIDC.
          node-version: "24.9.0"

      - run: bun install --frozen-lockfile

      - name: Build plugin
        working-directory: packages/plugin
        run: bunx tsc

      - name: Prepare package.json
        working-directory: packages/plugin
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          const lockText = require('fs').readFileSync('../../bun.lock', 'utf8');
          const lockJson = lockText.replace(/,(?=\s*[}\]])/g, '');
          const lock = JSON.parse(lockJson);
          const catalog = lock.catalog || {};

          for (const [key, value] of Object.entries(pkg.exports)) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          pkg.version = process.env.VERSION;

          for (const [k, v] of Object.entries(pkg.dependencies || {})) {
            if (v === 'workspace:*' || v === 'workspace:^' || v.startsWith('workspace:')) {
              pkg.dependencies[k] = '^' + pkg.version;
            } else if (v === 'catalog:' || v.startsWith('catalog:')) {
              const resolved = catalog[k];
              if (resolved) pkg.dependencies[k] = '^' + resolved;
            }
          }
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/plugin@' + pkg.version);
          "

      - name: Publish (OIDC — no token)
        working-directory: packages/plugin
        run: |
          if npm view "@librecode/plugin@$VERSION" version 2>/dev/null; then
            echo "@librecode/plugin@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi
