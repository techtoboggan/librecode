name: Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos-arm64
            os: macos-14
          - platform: macos-x64
            os: macos-13
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile

      # Build the CLI sidecar first
      - name: Build CLI
        run: bun run script/build.ts --single
        working-directory: packages/librecode

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          cache-on-failure: true

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libdbus-1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Desktop
        # APPIMAGE_EXTRACT_AND_RUN avoids FUSE kernel module requirement in CI
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: cargo tauri build --config tauri.prod.conf.json --no-sign
        working-directory: packages/desktop/src-tauri

      - uses: actions/upload-artifact@v4
        with:
          name: librecode-desktop-${{ matrix.platform }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/
          retention-days: 7

  release:
    name: Create Desktop Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
