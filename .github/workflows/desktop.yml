name: Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            cli_src: packages/librecode/dist/librecode-linux-x64/bin/librecode
            cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-x86_64-unknown-linux-gnu
            # AppImage requires FUSE which is blocked on GH Actions runners
            bundles: deb,rpm
          - platform: macos-arm64
            os: macos-14
            cli_src: packages/librecode/dist/librecode-darwin-arm64/bin/librecode
            cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-aarch64-apple-darwin
            # DMG creation fails without code signing; .app bundle is sufficient for CI
            bundles: app
          - platform: windows
            os: windows-latest
            cli_src: packages/librecode/dist/librecode-windows-x64/bin/librecode.exe
            cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-x86_64-pc-windows-msvc.exe
            bundles: nsis

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile

      # Stamp the desktop package.json with the release tag version so the
      # Tauri bundle (and resulting RPM filename) matches the release tag.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq ".version = \"$VERSION\"" packages/desktop/package.json > "$tmp"
          mv "$tmp" packages/desktop/package.json

      # Build the CLI sidecar first
      - name: Build CLI
        run: bun run script/build.ts --single
        working-directory: packages/librecode

      # Copy the built CLI binary to the Tauri sidecar location with the
      # platform-specific Rust target triple name that Tauri's externalBin expects
      - name: Stage CLI sidecar
        shell: bash
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          cp "${{ matrix.cli_src }}" "${{ matrix.cli_dst }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          cache-on-failure: true

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libdbus-1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Desktop
        run: cargo tauri build --config tauri.prod.conf.json --no-sign --bundles ${{ matrix.bundles }}
        working-directory: packages/desktop/src-tauri

      - uses: actions/upload-artifact@v4
        with:
          name: librecode-desktop-${{ matrix.platform }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/
          retention-days: 7

  release:
    name: Create Desktop Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
