name: Desktop

# Called by release.yml. Builds Tauri desktop app for Linux/macOS/Windows.
# Uploads installer artifacts; release.yml collects them and uploads to the
# GitHub Release. COPR submission is handled by copr.yml.
on:
  workflow_call:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.9.5"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.9.5"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ inputs.version }}

jobs:
  build:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            cli_src: packages/librecode/dist/librecode-linux-x64/bin/librecode
            cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-x86_64-unknown-linux-gnu
            bundles: deb,rpm
            sign: false
          # ─── TEMPORARILY DISABLED during Linux-focused beta (v0.9.2x) ─────
          # Re-enable by uncommenting the two blocks below + restoring
          # build-flatpak in release.yml. macOS signing + Windows NSIS + the
          # Flatpak vendor build each take ~15-25 min; skipping them cuts
          # release-pipeline turnaround from ~30 min to ~10 min for rapid
          # iteration on Linux COPR/deb before broader platform beta.
          # - platform: macos-arm64
          #   os: macos-14
          #   cli_src: packages/librecode/dist/librecode-darwin-arm64/bin/librecode
          #   cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-aarch64-apple-darwin
          #   bundles: app,dmg
          #   sign: true
          # - platform: windows
          #   os: windows-latest
          #   cli_src: packages/librecode/dist/librecode-windows-x64/bin/librecode.exe
          #   cli_dst: packages/desktop/src-tauri/sidecars/librecode-cli-x86_64-pc-windows-msvc.exe
          #   bundles: nsis
          #   sign: false

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # Note: we don't gate on @librecode/i18n@$VERSION here. The lockfile
      # pins i18n to a specific published version independent of the main
      # repo tag, so `bun install --frozen-lockfile` will fail loudly with
      # a clear error if the pinned version isn't on npm — no need for a
      # 10-minute retry loop against the wrong version.
      - run: bun install --frozen-lockfile

      - name: Stamp version in packages/desktop/package.json
        shell: bash
        run: |
          tmp=$(mktemp)
          jq ".version = \"$VERSION\"" packages/desktop/package.json > "$tmp"
          mv "$tmp" packages/desktop/package.json

      - name: Build CLI sidecar
        env:
          LIBRECODE_VERSION: v${{ env.VERSION }}
        run: bun run script/build.ts --single
        working-directory: packages/librecode

      - name: Stage CLI sidecar for Tauri externalBin
        shell: bash
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          cp "${{ matrix.cli_src }}" "${{ matrix.cli_dst }}"
          SIZE=$(stat -c%s "${{ matrix.cli_dst }}" 2>/dev/null || stat -f%z "${{ matrix.cli_dst }}")
          echo "CLI sidecar size: $SIZE bytes"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          cache-on-failure: true

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libdbus-1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      - name: Import Apple certificate
        if: matrix.sign == true
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/certificate.p12
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning build.keychain

      - name: Build Desktop (signed — macOS)
        if: matrix.sign == true
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Re-unlock keychain before the build (Rust compile can take 5+ min,
          # during which keychain might auto-lock and hang codesign)
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          cargo tauri build --config tauri.prod.conf.json --bundles ${{ matrix.bundles }}
        working-directory: packages/desktop/src-tauri

      - name: Build Desktop (unsigned — Linux / Windows)
        if: matrix.sign != true
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: cargo tauri build --config tauri.prod.conf.json --no-sign --bundles ${{ matrix.bundles }}
        working-directory: packages/desktop/src-tauri

      - name: Clean up build keychain
        if: always() && matrix.sign == true
        run: security delete-keychain build.keychain || true

      # Repack the Tauri RPM with the correct package name (LibreCode → libre-code
      # by default; we want librecode-desktop to match COPR/AUR/Flatpak).
      - name: Repack RPM as librecode-desktop
        if: matrix.platform == 'linux'
        run: |
          set -ex
          BUNDLE="packages/desktop/src-tauri/target/release/bundle"
          OLD_RPM=$(ls "$BUNDLE"/rpm/*.rpm | grep -v '\.src\.rpm' | head -1)
          echo "Repacking: $OLD_RPM"
          sudo apt-get install -y --no-install-recommends rpm rpm2cpio cpio
          STAGE=$(mktemp -d)
          cd "$STAGE"
          rpm2cpio "$OLDPWD/$OLD_RPM" | cpio -idm
          mkdir -p ~/rpmbuild/{SPECS,SOURCES,BUILD,BUILDROOT,RPMS}
          tar -czf ~/rpmbuild/SOURCES/librecode-desktop.tar.gz .
          cd "$OLDPWD"
          cat > ~/rpmbuild/SPECS/repack.spec << SPEC
          %global debug_package %{nil}
          %global __strip /bin/true
          Name:    librecode-desktop
          Version: ${VERSION}
          Release: 1
          Summary: AI-powered development tool
          License: MIT
          Source0: librecode-desktop.tar.gz
          AutoReqProv: no
          Obsoletes: libre-code < %{version}-%{release}
          Provides: libre-code = %{version}-%{release}
          Obsoletes: LibreCode < %{version}-%{release}
          Provides: LibreCode = %{version}-%{release}
          %description
          LibreCode desktop app — local-first AI coding agent.
          %prep
          %setup -q -c
          %install
          cp -a . %{buildroot}/
          %files
          /*
          SPEC
          rpmbuild -bb ~/rpmbuild/SPECS/repack.spec
          NEW_RPM=$(ls ~/rpmbuild/RPMS/x86_64/librecode-desktop-${VERSION}-1.x86_64.rpm)
          echo "Repacked: $NEW_RPM"
          rm "$OLD_RPM"
          cp "$NEW_RPM" "$BUNDLE/rpm/"

      # Collect only the final installer files — avoid uploading the entire
      # bundle tree (which would include every file inside .app directories).
      - name: Stage installer artifacts
        shell: bash
        run: |
          set -x
          STAGE="dist-stage"
          mkdir -p "$STAGE"
          BUNDLE="packages/desktop/src-tauri/target/release/bundle"
          shopt -s nullglob
          for f in "$BUNDLE"/deb/*.deb; do cp "$f" "$STAGE/"; done
          for f in "$BUNDLE"/rpm/*.rpm; do [[ "$f" != *.src.rpm ]] && cp "$f" "$STAGE/"; done
          for f in "$BUNDLE"/nsis/*.exe; do cp "$f" "$STAGE/"; done
          for f in "$BUNDLE"/dmg/*.dmg; do cp "$f" "$STAGE/"; done
          for app in "$BUNDLE"/macos/*.app; do
            STEM=$(basename "$app" .app)
            tar -czf "$STAGE/${STEM}_${VERSION}_aarch64.app.tar.gz" \
              -C "$(dirname "$app")" "$(basename "$app")"
          done
          shopt -u nullglob
          echo "Staged artifacts:"
          ls -lh "$STAGE/" || echo "(empty)"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist-stage/
          if-no-files-found: warn
          retention-days: 7
