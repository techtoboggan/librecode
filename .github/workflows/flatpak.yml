name: Flatpak

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest

    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      # Install Bun so we can pre-build the JS/TS parts before entering the
      # Flatpak sandbox (which has no network access).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # The npm-publish workflow fires in parallel with this one. Wait for
      # @librecode/i18n to be on npm before bun install.
      - name: Wait for @librecode/i18n on npm
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for @librecode/i18n@$VERSION..."
          for i in $(seq 1 20); do
            npm view @librecode/i18n@$VERSION version 2>/dev/null && break
            echo "Not yet (attempt $i/20), retrying in 30s..."
            sleep 30
          done

      # Pre-build the CLI sidecar and desktop frontend BEFORE entering the
      # Flatpak sandbox. The sandbox blocks outbound network, so bun/npm
      # package resolution (ghostty-web → @opentui/solid etc.) fails there.
      # We bundle the outputs as pre-built-assets.tar.gz and inject it as a
      # local archive source so the Flatpak build is pure Rust.
      - name: Pre-build frontend and CLI sidecar
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          LIBRECODE_VERSION: ${{ github.ref_name }}
        run: |
          bun install --frozen-lockfile
          # Build the CLI sidecar binary for linux-x64 (Flatpak is x64-only).
          # --target linux-x64 produces dist/librecode-linux-x64/bin/librecode.
          # Copy to the flat path the Flatpak manifest expects.
          cd packages/librecode
          bun run script/build.ts --target linux-x64
          cp dist/librecode-linux-x64/bin/librecode dist/librecode-cli-linux-x64
          cd ../..
          # Build the desktop frontend (vite)
          cd packages/desktop
          bun run build
          cd ../..
          # Package both for the sandbox — paths mirror the monorepo layout
          # so flatpak-builder extracts them on top of the release tarball
          tar -czf packages/desktop/flatpak/pre-built-assets.tar.gz \
            packages/librecode/dist/librecode-cli-linux-x64 \
            packages/desktop/dist

      # Compute the sha256 of the GitHub-generated tarball for this tag and
      # patch the manifest in place. Runs only on tag pushes — on manual
      # dispatch we validate the manifest as-is.
      - name: Patch release tarball sha256 in manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          echo "Fetching ${URL} to compute sha256"
          for i in 1 2 3 4 5; do
            if SHA=$(curl -fsSL "${URL}" | sha256sum | awk '{print $1}') && [[ -n "${SHA}" ]]; then
              break
            fi
            echo "retry ${i}…"
            sleep $((i * 5))
          done
          if [[ -z "${SHA}" ]]; then
            echo "error: could not compute tarball sha256 after 5 attempts" >&2
            exit 1
          fi
          echo "Computed sha256: ${SHA}"
          sed -i \
            -e "s|sha256: REPLACE_AT_RELEASE_TIME_SEE_FLATPAK_WORKFLOW|sha256: ${SHA}|" \
            -e "s|url: https://github.com/.*/archive/refs/tags/v.*\.tar\.gz|url: ${URL}|" \
            packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Validate manifest
        run: |
          flatpak-builder --show-manifest packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Build Flatpak bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: librecode-desktop.flatpak
          manifest-path: packages/desktop/flatpak/com.librecode.desktop.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Validate AppStream metadata
        # appstreamcli is pre-installed in the gnome-47 Fedora container;
        # do not use apt-get (this is not a Debian/Ubuntu image).
        # The || true means an invalid metainfo file is non-fatal.
        run: |
          appstreamcli validate \
            packages/desktop/src-tauri/release/appstream.metainfo.xml \
            || true

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: librecode-desktop.flatpak
          prerelease: ${{ contains(github.ref, '-preview.') || contains(github.ref, '-rc.') }}
