name: Flatpak

# Called by release.yml. Builds the Flatpak bundle and uploads as artifact.
# release.yml collects artifacts and attaches them to the GitHub Release.
on:
  workflow_call:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.9.5"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.9.5"
        required: true
        type: string

permissions:
  contents: read

env:
  VERSION: ${{ inputs.version }}

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest

    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # Note: we don't gate on @librecode/i18n@$VERSION here. The lockfile
      # pins i18n to a specific published version independent of the main
      # repo tag, so `bun install --frozen-lockfile` will fail loudly with
      # a clear error if the pinned version isn't on npm — no need for a
      # 10-minute retry loop against a tag version i18n was never published at.

      # Pre-build the CLI sidecar and desktop frontend BEFORE entering the
      # Flatpak sandbox. The sandbox blocks outbound network, so bun/npm
      # package resolution fails there.
      - name: Pre-build frontend and CLI sidecar
        env:
          LIBRECODE_VERSION: v${{ env.VERSION }}
        run: |
          bun install --frozen-lockfile
          cd packages/librecode
          bun run script/build.ts --target linux-x64
          cp dist/librecode-linux-x64/bin/librecode dist/librecode-cli-linux-x64
          cd ../..
          cd packages/desktop
          bun run build
          cd ../..
          tar -czf packages/desktop/flatpak/pre-built-assets.tar.gz \
            packages/librecode/dist/librecode-cli-linux-x64 \
            packages/desktop/dist

      # Compute sha256 of the GitHub-generated source tarball + patch the manifest
      - name: Patch release tarball sha256 + URL in manifest
        run: |
          TAG="v${VERSION}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          echo "Fetching ${URL} to compute sha256"
          for i in 1 2 3 4 5; do
            if SHA=$(curl -fsSL "${URL}" | sha256sum | awk '{print $1}') && [[ -n "${SHA}" ]]; then
              break
            fi
            echo "retry ${i}…"
            sleep $((i * 5))
          done
          if [[ -z "${SHA}" ]]; then
            echo "::error::could not compute tarball sha256 after 5 attempts"
            exit 1
          fi
          echo "Computed sha256: ${SHA}"
          sed -i \
            -e "s|sha256: REPLACE_AT_RELEASE_TIME_SEE_FLATPAK_WORKFLOW|sha256: ${SHA}|" \
            -e "s|url: https://github.com/.*/archive/refs/tags/v.*\.tar\.gz|url: ${URL}|" \
            packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Validate manifest
        run: flatpak-builder --show-manifest packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: librecode-desktop.flatpak
          manifest-path: packages/desktop/flatpak/com.librecode.desktop.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Validate AppStream metadata
        run: |
          appstreamcli validate \
            packages/desktop/src-tauri/release/appstream.metainfo.xml || true

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: librecode-desktop.flatpak
          if-no-files-found: error
          retention-days: 7
