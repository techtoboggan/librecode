name: Flatpak

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest

    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      # Compute the sha256 of the GitHub-generated tarball for this tag and
      # patch the manifest in place. Runs only on tag pushes — on manual
      # dispatch we validate the manifest as-is.
      - name: Patch release tarball sha256 in manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          echo "Fetching ${URL} to compute sha256"
          for i in 1 2 3 4 5; do
            if SHA=$(curl -fsSL "${URL}" | sha256sum | awk '{print $1}') && [[ -n "${SHA}" ]]; then
              break
            fi
            echo "retry ${i}…"
            sleep $((i * 5))
          done
          if [[ -z "${SHA}" ]]; then
            echo "error: could not compute tarball sha256 after 5 attempts" >&2
            exit 1
          fi
          echo "Computed sha256: ${SHA}"
          sed -i \
            -e "s|sha256: REPLACE_AT_RELEASE_TIME_SEE_FLATPAK_WORKFLOW|sha256: ${SHA}|" \
            packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Validate manifest
        run: |
          flatpak-builder --show-manifest packages/desktop/flatpak/com.librecode.desktop.yml

      - name: Build Flatpak bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: librecode-desktop.flatpak
          manifest-path: packages/desktop/flatpak/com.librecode.desktop.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Validate AppStream metadata
        # appstreamcli is pre-installed in the gnome-47 Fedora container;
        # do not use apt-get (this is not a Debian/Ubuntu image).
        # The || true means an invalid metainfo file is non-fatal.
        run: |
          appstreamcli validate \
            packages/desktop/src-tauri/release/appstream.metainfo.xml \
            || true

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: librecode-desktop.flatpak
          prerelease: ${{ contains(github.ref, '-preview.') || contains(github.ref, '-rc.') }}
