<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LibreCode Brand Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 40px; }
    h1 { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 40px; }
    section { margin-bottom: 64px; }
    h2 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 24px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .row { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }

    /* Logo lockups */
    .logo-card { border-radius: 12px; overflow: hidden; }
    .logo-card img { display: block; width: 600px; height: auto; }
    .logo-card.dark { background: #0A0B0D; }
    .logo-card.light { background: #F5F0E8; }

    /* Marks */
    .mark-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .mark-card span { font-size: 10px; color: #555; }
    .mark-card img { display: block; border-radius: 18px; }
    .mark-card.dark img { background: #0A0B0D; }
    .mark-card.light img { background: #F5F0E8; }
    .mark-card.transparent img { background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 16px 16px; border-radius: 0; }

    /* OG images */
    .og-card { border-radius: 8px; overflow: hidden; }
    .og-card img { display: block; width: 600px; height: auto; }

    .label { font-size: 11px; color: #555; margin-top: 6px; text-align: center; }
  </style>
</head>
<body>
  <h1>LibreCode Brand Preview</h1>

  <section>
    <h2>Full Logo Lockups</h2>
    <div class="row">
      <div>
        <div class="logo-card dark"><img src="logo-full-dark.svg" alt="Full logo dark"></div>
        <p class="label">Dark</p>
      </div>
      <div>
        <div class="logo-card light"><img src="logo-full-light.svg" alt="Full logo light"></div>
        <p class="label">Light</p>
      </div>
    </div>
  </section>

  <section>
    <h2>Mark — 128px preview</h2>
    <div class="row">
      <div class="mark-card dark">
        <img src="mark-dark.svg" width="128" height="128" alt="Mark dark">
        <span>Dark</span>
      </div>
      <div class="mark-card light">
        <img src="mark-light.svg" width="128" height="128" alt="Mark light">
        <span>Light</span>
      </div>
      <div class="mark-card transparent">
        <img src="mark-transparent.svg" width="128" height="128" alt="Mark transparent">
        <span>Transparent</span>
      </div>
    </div>
  </section>

  <section>
    <h2>Mark — Small sizes</h2>
    <div class="row" style="align-items: flex-end;">
      <div class="mark-card dark"><img src="mark-dark.svg" width="64" height="64" alt="64px"><span>64px</span></div>
      <div class="mark-card dark"><img src="mark-dark.svg" width="48" height="48" alt="48px"><span>48px</span></div>
      <div class="mark-card dark"><img src="mark-dark.svg" width="32" height="32" alt="32px"><span>32px</span></div>
      <div class="mark-card dark"><img src="mark-dark.svg" width="16" height="16" alt="16px"><span>16px</span></div>
    </div>
  </section>

  <section>
    <h2>Tater Mascot</h2>
    <div class="row">
      <div>
        <div style="border-radius:12px;overflow:hidden;background:#0A0B0D">
          <img src="tater-dark.svg" width="256" height="256" alt="Tater dark">
        </div>
        <p class="label">Dark</p>
      </div>
      <div>
        <div style="border-radius:12px;overflow:hidden;background:#F5F0E8">
          <img src="tater-light.svg" width="256" height="256" alt="Tater light">
        </div>
        <p class="label">Light</p>
      </div>
      <div>
        <div style="border-radius:0;background:repeating-conic-gradient(#222 0% 25%,#333 0% 50%) 0 0/16px 16px">
          <img src="tater-transparent.svg" width="256" height="256" alt="Tater transparent">
        </div>
        <p class="label">Transparent</p>
      </div>
    </div>
  </section>
</body>
</html>
