<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="512" height="512">
  <!-- LC mark on dark rounded rectangle — use as app icon / favicon background -->
  <defs>
    <linearGradient id="g" x1="128" y1="22" x2="372" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DD4A8"/>
      <stop offset="42%"  stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#1E6CA0"/>
    </linearGradient>
    <linearGradient id="gc" x1="128" y1="22" x2="372" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DD4A8" stop-opacity="0.85"/>
