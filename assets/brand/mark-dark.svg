    </linearGradient>
    <path id="s1" d="M 129,32 C 127,72 125,112 127,148"/>
    <path id="s2" d="M 163,170 C 194,178 226,177 252,167 C 270,159 282,146 276,127"/>
    <path id="s3" d="M 328,50 C 358,63 376,90 376,117 C 376,144 358,170 328,185"/>
    <clipPath id="clip">
