  </defs>

  <!-- Dark rounded rect background -->
  <rect width="180" height="180" rx="36" fill="#0A0B0D"/>

  <!-- Monogram clipped to rounded rect -->
  <g clip-path="url(#clip)">
    <g transform="translate(-65.3,20.2) scale(0.638)">
      <path d="M 315,40
