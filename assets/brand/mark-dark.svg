        <textPath href="#s3">1 0 0 1 0 1 1 0 0 1 0 1</textPath>
      </text>
      <text x="185" y="175" font-family="'Fira Code','SF Mono','Consolas',monospace"
            font-size="19" font-weight="500" fill="url(#gc)">{}</text>
      <text x="258" y="127" font-family="'Fira Code','SF Mono','Consolas',monospace"
            font-size="15" font-weight="500" fill="url(#gc)">&lt;/&gt;</text>
      <path d="M 318,31 C 325,23 335,19 343,20 C 351,19 360,24 368,30"
            fill="none" stroke="#1E6CA0" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 335,18 C 341,11 350,8 357,9 C 364,8 372,13 379,19"
