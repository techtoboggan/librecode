[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
bdd_features_base_dir = features/
addopts = -v --timeout=60
markers =
    desktop: Desktop app UI tests (require running Tauri app)
    provider: Provider management tests
    models: Model selection tests
    smoke: Quick smoke tests
    slow: Slow tests (network, build)
